name: Run extrak.py

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run extrak.py
        run: python extrak.py
      - name: Upload hasil_decompile.pyc
        uses: actions/upload-artifact@v4
        with:
          name: hasil_decompile
          path: hasil_decompile.pyc
